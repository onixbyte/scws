name: Build Windows Binaries

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build on Windows (MSYS2/MinGW64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libtool
            autoconf
            automake
            libtool
            make

      - name: Generate build system
        run: |
          autoreconf -fiv

      - name: Configure
        run: |
          ./configure --prefix="$PWD/dist" --disable-shared --enable-static

      - name: Build
        run: |
          make -j$(nproc)

      - name: Install to dist directory
        run: |
          make install

      - name: Collect binaries
        run: |
          mkdir -p artifacts
          # Copy executables (MinGW may produce .exe or no extension)
          for name in scws scws-gen-dict; do
            if [ -f "dist/bin/${name}.exe" ]; then
              cp "dist/bin/${name}.exe" artifacts/
            elif [ -f "dist/bin/${name}" ]; then
              cp "dist/bin/${name}" artifacts/
            else
              echo "ERROR: binary ${name} not found in dist/bin/" >&2
              exit 1
            fi
          done
          # Copy static libraries
          find dist/lib -name "*.a" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: scws-windows-x64
          path: artifacts/
          if-no-files-found: error
